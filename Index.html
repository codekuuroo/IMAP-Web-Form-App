<!DOCTYPE html>
<html>
    <div class="main">
        <h2>PHILIPPINE CHARITY SWEEPSTAKES OFFICE</h2>

        <h3>INDIVIDUAL MEDICAL ASSISTANCE PROGRAM (IMAP)</h3>
        <form action="connect.php" method="post">
            <label for="Pname">FULL NAME OF PATIENT:</label><br>
            <input type="text" id="Pname" name="Pname" required><br>

            <label for="Addr">ADDRESS:</label><br>
            <input type="text" id="Addr" name="Addr" required><br>

            <label for="CivStats">Civil Status:</label><br>
            <select id="CivStats" name="CivStats" required>
                <option value="" hidden>
                    Select an option...
                </option>
                <option value="single">
                    Single
                </option>
                <option value="married">
                    Married
                </option>
                <option value="widow">
                    Widow(er)
                </option>
                <option value="separated">
                    Separated
                </option>
                <option value="partner">
                    Common-Law Partner
                </option>
            </select><br>
            
            <label for="Bdate">Birth Date</label><br>
            <input type="date" id="Bdate" name="Bdate" required><br>

            <label>Sex</label><br>
            <input type="radio" id="male" name="sex" value="male" required>
            <label for="male">Male</label>
            <input type="radio" id="female" name="sex" value="female">
            <label for="female">Female</label><br>

            <label for="religion">Religion:</label><br>
            <input type="text" id="religion"><br>

            <label for="education">Educational Attainment:</label><br>
            <select id="education" name="education" required>
                <option value="" hidden>
                    Select an option...
                </option>
                <option value="None">
                    None
                </option>
                <option value="elementary">
                    Elementary
                </option>
                <option value="High School">
                    High School
                </option>
                <option value="College">
                    College
                </option>
                <option value="Post-Graduate">
                    Post-Graduate
                </option>
                <option value="Vocational">
                    Vocational
                </option>
            </select><br>

            <label for="job">Job:</label><br>
            <input type="text" id="job" name="job" required><br>

            <label for="salary">Salary:</label><br>
            <input type="number" min="0" id="salary" name="salary" required><br>
            
            <label for="philhealth">PhilHealth Membership Status:</label><br>
            <select id="philhealth" name="philhealth" required>
                <option value="" disabled selected hidden>
                    Select an option...
                </option>
                <option value="member">
                    Member
                </option>
                <option value="nonMember">
                    Non-Member
                </option>
                <option value="dependent">
                    Dependent
                </option>
            </select><br>

            <label for="diagnosis">Diagnosis:</label><br>
            <input type="text" id="diagnosis" name="diagnosis" required><br>
            
            <label for="request">Nature of Requested Assistance:</label><br>
            <select id="request" name="request" onchange="toggleRequestDetails()" required>
                <option value="" disabled selected hidden>
                    Select an option...
                </option>
                <option value="confine">
                    Confinement
                </option>
                <option value="dialysis">
                    Dialysis
                </option>
                <option value="chemotherapy">
                    Chemotherapy
                </option>
                <option value="medicine">
                    medicine
                </option>
                <option value="surgicalsupp">
                    Surgical Supplies
                </option>
                <option value="implant">
                    Implant
                </option>
                <option value="laboratory">
                    Laboratory/Diagnostic Procedures
                </option>
                <option value="medDevice">
                    Medical Devices
                </option>
                <option value="assistDevice">
                    Assistive Devices
                </option>
                <option value="minProc">
                    Non & Minimally Invasive Procedures
                </option>
                <option value="transplant">
                    Transplant
                </option>
                <option value="rehab">
                    Rehabilitative Therapy
                </option>
                <option value="others">
                    Others
                </option>
            </select><br>

            <div id="requestDetails" style="display: none;">
                <label for="otherRequest">Please specify:</label><br>
                <input type="text" id="otherRequest" name="otherRequest"><br>
            </div>

            <label for="relative">Household Family Composition:</label>
            <div id="members-container">
            <button type="button" onclick="addMember()">+ Add Relative</button>
            </div><br>

            <button type="submit">Submit</button>
        </form>    

    </div>

    <script src="main.js"></script>
</body>
</html>
